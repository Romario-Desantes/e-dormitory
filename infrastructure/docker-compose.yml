services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_CONTAINER_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      ConnectionStrings__Postgres: "Host=${POSTGRES_HOST};Port=${POSTGRES_CONTAINER_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Auth__Issuer: ${AUTH_ISSUER}
      Auth__Audience: ${AUTH_AUDIENCE}
      Auth__SigningKey: ${AUTH_SIGNING_KEY}
      Storage__Provider: ${STORAGE_PROVIDER}
      Storage__RootPath: ${STORAGE_ROOT_PATH}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - api-storage:/app/storage

  web:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.web
      target: dev
    depends_on:
      - api
    ports:
      - "${WEB_HOST_PORT}:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_DEV_API_PROXY_TARGET: ${VITE_DEV_API_PROXY_TARGET}
    volumes:
      - ../src/frontend/web:/app
      - web-node-modules:/app/node_modules

volumes:
  postgres-data:
  api-storage:
  web-node-modules:
