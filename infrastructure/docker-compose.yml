services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: edormitory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=edormitory;Username=postgres;Password=postgres
      Auth__Issuer: EDormitory
      Auth__Audience: EDormitory.Web
      Auth__SigningKey: edormitory-docker-signing-key-2026
      Storage__Provider: Disk
      Storage__RootPath: /app/storage
    depends_on:
      - postgres
      - minio
    ports:
      - "8080:8080"
    volumes:
      - api-storage:/app/storage

  web:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.web
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  postgres-data:
  minio-data:
  api-storage:
